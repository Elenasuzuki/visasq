name: Visasq Daily Watcher

on:
  schedule:
    # 毎日日本時間 AM 9:00 (UTC 0:00) に自動実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  run-watcher:
    runs-on: ubuntu-latest

    steps:
    # Node.js 24に対応した最新版(v6)に変更
    - name: Checkout repository
      uses: actions/checkout@v6

    # cache: 'pip' を削除し、最新版に変更
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright google-generativeai requests
        playwright install chromium

    - name: Run Python Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        VISASQ_COOKIE: ${{ secrets.VISASQ_COOKIE }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: python main.py
