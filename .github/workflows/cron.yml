name: Visasq Daily Watcher

on:
  schedule:
    # 毎日日本時間 AM 9:00 (UTC 0:00) に自動実行
    - cron: '0 0 * * *'
  workflow_dispatch: # GitHubの画面から手動でいつでも即時実行できるボタンを有効化

jobs:
  run-watcher:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright google-generativeai requests
        # Playwrightに必要なブラウザ（Chromium）のインストール
        playwright install chromium

    - name: Run Python Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        VISASQ_COOKIE: ${{ secrets.VISASQ_COOKIE }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: python main.py
